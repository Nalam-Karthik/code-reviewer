
services:

  # ── 1. Flask API ─────────────────────────────────────────────
  # Builds from flask-api/Dockerfile
  # Mounts the code folder so changes reflect without rebuild
  flask-api:
    build:
      context: ./flask-api
      dockerfile: Dockerfile
    container_name: cr-api
    env_file: .env                   #this line loads all the variables from the env file 
    environment:                           
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092                         
    ports:
      - "5001:5000"
      - "50051:50051"                        # Mac port 5001 → container port 5000
                                           # (AirPlay uses 5000 on Mac, so we use 5001)
    volumes:
      - ./flask-api:/app                   # live code reload
    depends_on:
      mysql:
        condition: service_healthy         # wait for MySQL to be actually ready
      redis:
        condition: service_healthy
    networks:
      - cr-net
    restart: unless-stopped

  # ── 2. MySQL 8 ───────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: cr-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql          # data survives container restarts
    ports:
      - "3307:3306"                        # 3307 externally (avoids conflict with local MySQL)
    networks:
      - cr-net
    restart: unless-stopped
    healthcheck:                           # Flask waits for this to pass before starting
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "${DB_USER}", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── 3. Redis ─────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: cr-redis
    volumes:
      - redis-data:/data
    networks:
      - cr-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── 4. ChromaDB ──────────────────────────────────────────────
  # Vector database — stores embeddings of past reviews
  # We use it on Day 1 to save review text, Day 2 to query similar ones
  chromadb:
    image: chromadb/chroma:latest
    container_name: cr-chromadb
    volumes:
      - chroma-data:/chroma/chroma
    ports:
      - "8000:8000"
    networks:
      - cr-net
    restart: unless-stopped


  # ── Zookeeper (Kafka needs this to manage cluster state) ──
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: cr-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - cr-net
    restart: unless-stopped

  # ── Kafka broker ──────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: cr-kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # PLAINTEXT_HOST is how your Mac connects (localhost:9092)
      # PLAINTEXT is how other containers connect (kafka:29092)
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "9092:9092"
    networks:
      - cr-net
    restart: unless-stopped

  # ── Audit consumer (separate Python service) ──────────────
  audit-consumer:
    build:
      context: ./audit-consumer
      dockerfile: Dockerfile
    container_name: cr-audit-consumer
    env_file: .env
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - DB_HOST=mysql
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - cr-net
    restart: unless-stopped



# Named volumes — data lives here even when containers stop
volumes:
  mysql-data:
  redis-data:
  chroma-data:
  

# One shared network — containers talk to each other by container name
# e.g. flask-api connects to MySQL at host "mysql", port 3306
networks:
  cr-net:
    driver: bridge